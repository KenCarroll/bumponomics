<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUMPS.app - DSTM Dashboard v3.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 95%; max-width: 1200px; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-weight: 800; letter-spacing: -0.5px; }
        p.subtitle { text-align: center; color: #7f8c8d; font-size: 1em; margin-bottom: 25px; }
        
        .controls { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 25px; }
        button {
            padding: 10px 20px; border: 1px solid #dcdcdc; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9em; transition: all 0.2s ease;
            background: white; color: #555;
        }
        button:hover { background: #f8f9fa; border-color: #bbb; }
        button.active { background: #2c3e50; color: white; border-color: #2c3e50; box-shadow: 0 4px 10px rgba(44, 62, 80, 0.2); }

        .chart-wrapper { position: relative; height: 600px; width: 100%; }
        
        .legend-box { display: flex; gap: 20px; justify-content: center; margin-top: 25px; font-size: 0.85em; color: #666; flex-wrap: wrap; background: #f8f9fa; padding: 12px; border-radius: 8px; border: 1px solid #eee;}
        .dot { height: 12px; width: 12px; display: inline-block; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="container">
        <h1>BUMPONOMICS - DSTM Framework Dashboard</h1>
        <p class="subtitle">Organisational Development and Transformation Model (DSTM)</p>

        <div class="controls">
            <button onclick="updateChart('startup')" id="btn-startup" class="active">1. Startup</button>
            <button onclick="updateChart('surviving')" id="btn-surviving">2. Surviving (The Grind)</button>
            <button onclick="updateChart('thriving')" id="btn-thriving">3. Thriving</button>
            <button onclick="updateChart('meta')" id="btn-meta">4. Metamorphosis (Dual Curve)</button>
            <button onclick="updateChart('demise')" id="btn-demise">5. Crash</button>
        </div>

        <div class="chart-wrapper">
            <canvas id="dstmChart"></canvas>
        </div>

        <div class="legend-box">
            <span><span class="dot" style="background:#e74c3c"></span>Revolve (Red)</span>
            <span><span class="dot" style="background:#f1c40f"></span>Resolve (Yellow)</span>
            <span><span class="dot" style="background:#2ecc71"></span>Solve (Green)</span>
            <span><span class="dot" style="background:#3498db"></span>Dissolve/Evolve (Blue)</span>
            <span><span class="dot" style="background:#95a5a6"></span>Absolve (Grey)</span>
            <span style="border-left: 1px solid #ccc; padding-left: 15px; margin-left: 5px;">
                <span style="display:inline-block; width: 20px; border-bottom: 3px dotted #555; margin-bottom: 4px; margin-right: 5px;"></span> Reference Curves
            </span>
        </div>
    </div>

<script>
    // --- 1. NEW ZONE ARCHITECTURE ---
    
    // Total Y Range: -5 to +20
    // Demise: -5 to -2 (Small Basement)
    // Survive: -2 to +10 (HUGE OCEAN - Range of 12 units)
    // Thrive: +10 to +16 (Medium Island - Range of 6 units)
    // Meta: +16 to +20 (Small Peak - Range of 4 units)

    const colors = {
        red: '#e74c3c', grey: '#95a5a6', yellow: '#f1c40f', green: '#2ecc71', blue: '#3498db',
        zoneMeta: 'rgba(155, 89, 182, 0.15)',
        zoneThrive: 'rgba(46, 204, 113, 0.08)',
        zoneSurvive: 'rgba(52, 152, 219, 0.1)', // The Big Blue Ocean
        zoneDemise: 'rgba(192, 57, 43, 0.15)'
    };

    const scenarios = {
        startup: {
            curve1: [{x:0.5, y:-4}, {x:1, y:-2}, {x:2, y:2}, {x:3, y:8}, {x:3.5, y:11}],
            curve2: [], // No second curve
            bubbles: [
                { x: 1, y: -3.5, r: 20, id: 'b1', connectTo: 'b2', bg: colors.grey, title: 'Cash Burn (Q1)' },
                { x: 2, y: -4.5, r: 25, id: 'b2', bg: colors.red, title: 'Cash Burn (Q2)' },
                { x: 1, y: 0, r: 12, id: 'm1', connectTo: 'm2', bg: colors.yellow, title: 'MVP Dev' },
                { x: 2, y: 3, r: 18, id: 'm2', connectTo: 'm3', bg: colors.blue, title: 'Launch' },
                { x: 3, y: 9, r: 22, id: 'm3', bg: colors.green, title: 'First Revenue' }
            ]
        },
        surviving: {
            curve1: [{x:0.5, y:2}, {x:1, y:4}, {x:2, y:4}, {x:3, y:3}, {x:3.5, y:2}],
            curve2: [],
            bubbles: [
                { x: 1, y: 4, r: 15, id: 'o1', connectTo: 'o2', bg: colors.yellow, title: 'Ops' },
                { x: 2, y: 3, r: 15, id: 'o2', connectTo: 'o3', bg: colors.yellow, title: 'Ops' },
                { x: 3, y: 3, r: 15, id: 'o3', bg: colors.yellow, title: 'Ops' },
                { x: 1, y: 1, r: 10, id: 'c1', connectTo: 'c2', bg: colors.yellow, title: 'Churn' },
                { x: 2, y: 0, r: 10, id: 'c2', bg: colors.yellow, title: 'Churn' },
                { x: 3, y: -2.5, r: 18, id: 't1', bg: colors.grey, title: 'Ignored Threat' } // Dipping into Demise
            ]
        },
        thriving: {
            curve1: [{x:0.5, y:8}, {x:1, y:11}, {x:2, y:14}, {x:3, y:15}, {x:3.5, y:15.5}],
            curve2: [],
            bubbles: [
                { x: 1, y: 11, r: 15, id: 's1', connectTo: 's2', bg: colors.green, title: 'Sales' },
                { x: 2, y: 13, r: 20, id: 's2', connectTo: 's3', bg: colors.green, title: 'Sales' },
                { x: 3, y: 14.5, r: 25, id: 's3', bg: colors.green, title: 'Sales' },
                { x: 1, y: 9, r: 10, id: 'e1', connectTo: 'e2', bg: colors.green, title: 'Expansion' },
                { x: 2, y: 12, r: 15, id: 'e2', bg: colors.green, title: 'Expansion' },
                { x: 3, y: 13, r: 8, id: 'h1', bg: colors.red, title: 'Hubris/Bureaucracy' }
            ]
        },
        meta: {
            // THE DUAL CURVE SCENARIO
            curve1: [{x:0.5, y:14}, {x:1, y:12}, {x:2, y:4}, {x:3, y:-4}, {x:3.5, y:-5}], // Dying Legacy
            curve2: [{x:0.5, y:-2}, {x:1, y:0}, {x:2, y:8}, {x:3, y:17}, {x:3.5, y:19}],  // Emerging Future
            bubbles: [
                // Legacy falling
                { x: 1, y: 12, r: 25, id: 'l1', connectTo: 'l2', bg: colors.yellow, title: 'Legacy (Cash Cow)' },
                { x: 2, y: 3, r: 20, id: 'l2', connectTo: 'l3', bg: colors.red, title: 'Legacy (Harvest)' },
                { x: 3, y: -3.5, r: 15, id: 'l3', bg: colors.grey, title: 'Legacy (Sunset)' },
                // Future rising
                { x: 1, y: 2, r: 12, id: 'n1', connectTo: 'n2', bg: colors.blue, title: 'The New Bet' },
                { x: 2, y: 10, r: 18, id: 'n2', connectTo: 'n3', bg: colors.blue, title: 'The New Bet' },
                { x: 3, y: 18, r: 30, id: 'n3', bg: colors.blue, title: 'Metamorphosis' }
            ]
        },
        demise: {
            curve1: [{x:0.5, y:0}, {x:1, y:-2}, {x:2, y:-4.5}, {x:3, y:-8}, {x:3.5, y:-10}],
            curve2: [],
            bubbles: [
                { x: 1, y: -3, r: 15, id: 'td1', connectTo: 'td2', bg: colors.grey, title: 'Tech Debt' },
                { x: 2, y: -4.5, r: 25, id: 'td2', connectTo: 'td3', bg: colors.grey, title: 'Tech Debt' },
                { x: 3, y: -4.9, r: 30, id: 'td3', connectTo: 'fail', bg: colors.red, title: 'System Failure' },
                { x: 3, y: -9, r: 40, id: 'fail', bg: colors.red, title: 'Bankruptcy' }
            ]
        }
    };

    // --- 2. PLUGIN LOGIC ---
    const backgroundZonesPlugin = {
        id: 'backgroundZones',
        beforeDraw: (chart) => {
            const { ctx, chartArea, scales: { y } } = chart;
            if (!chartArea || !y) return;
            const { left, right, width } = chartArea;

            const drawZone = (yStart, yEnd, color, label) => {
                const yTop = y.getPixelForValue(yStart);
                const yBottom = y.getPixelForValue(yEnd);
                if (yTop === undefined || yBottom === undefined) return;
                
                ctx.fillStyle = color;
                ctx.fillRect(left, Math.min(yTop, yBottom), width, Math.abs(yBottom - yTop));
                
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.font = "bold 13px 'Segoe UI', sans-serif";
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillText(label, right - 20, (yTop + yBottom) / 2);
            };

            // NEW ZONE SIZES
            drawZone(20, 16, colors.zoneMeta, "METAMORPHOSING");
            drawZone(16, 10, colors.zoneThrive, "THRIVING");
            drawZone(10, -2, colors.zoneSurvive, "SURVIVING"); // Huge Zone
            drawZone(-2, -5, colors.zoneDemise, "DEMISED");

            // Threshold Line
            const yThreshold = y.getPixelForValue(-2);
            ctx.beginPath();
            ctx.moveTo(left, yThreshold);
            ctx.lineTo(right, yThreshold);
            ctx.strokeStyle = "#c0392b";
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            
            ctx.fillStyle = "#c0392b";
            ctx.font = "bold 11px Arial";
            ctx.textAlign = "left";
            ctx.fillText("SURVIVAL THRESHOLD", left + 10, yThreshold - 10);
        }
    };

    const trajectoryPlugin = {
        id: 'trajectoryLines',
        beforeDatasetsDraw: (chart) => {
            const { ctx } = chart;
            const meta = chart.getDatasetMeta(2); // Bubbles are index 2
            if (!meta || !meta.data) return;
            const dataset = chart.data.datasets[2];
            
            ctx.save();
            dataset.data.forEach((dp, index) => {
                if (!dp.connectTo) return;
                const targetIndex = dataset.data.findIndex(p => p.id === dp.connectTo);
                if (targetIndex === -1) return;
                
                const start = meta.data[index];
                const end = meta.data[targetIndex];
                if(start && end && start.x && end.x) {
                    ctx.beginPath();
                    ctx.moveTo(start.x, start.y);
                    ctx.lineTo(end.x, end.y);
                    ctx.strokeStyle = "rgba(0,0,0,0.2)";
                    ctx.lineWidth = 2;
                    ctx.setLineDash([3, 3]);
                    ctx.stroke();
                }
            });
            ctx.restore();
        }
    };

    // --- 3. CHART INIT ---
    let myChart = null;

    function initChart() {
        const ctx = document.getElementById('dstmChart').getContext('2d');
        
        myChart = new Chart(ctx, {
            type: 'bubble',
            data: {
                datasets: [
                    // Curve 1 (Primary/Legacy)
                    {
                        type: 'line',
                        label: 'Legacy Curve',
                        data: scenarios.startup.curve1,
                        borderColor: 'rgba(50, 50, 50, 0.4)',
                        borderWidth: 3,
                        borderDash: [5, 5],
                        pointRadius: 0,
                        tension: 0.4,
                        order: 2
                    },
                    // Curve 2 (Emerging/Future - Often empty)
                    {
                        type: 'line',
                        label: 'Future Curve',
                        data: scenarios.startup.curve2, // Empty for startup
                        borderColor: '#3498db', // Blue for the new curve
                        borderWidth: 3,
                        borderDash: [2, 2],
                        pointRadius: 0,
                        tension: 0.4,
                        order: 2
                    },
                    // BUMPS Bubbles
                    {
                        type: 'bubble',
                        label: 'BUMPS',
                        data: scenarios.startup.bubbles,
                        backgroundColor: (ctx) => (ctx.raw && ctx.raw.bg) ? ctx.raw.bg : '#ccc',
                        borderColor: '#fff',
                        borderWidth: 2,
                        order: 1
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        type: 'linear', min: 0.5, max: 3.5,
                        title: { display: true, text: 'TIME HORIZON', font: {weight:'bold'} },
                        ticks: {
                            callback: v => v===1?"PAST (Q1)":v===2?"PRESENT (Q2)":v===3?"FUTURE (Q3)":"",
                            font: {weight: 'bold'}
                        }
                    },
                    y: {
                        min: -5, max: 20, // Expanded range
                        title: { display: true, text: 'VITALITY SCORE', font: {weight:'bold'} },
                        grid: { display: false }, ticks: { display: false }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: c => (c.dataset.type === 'line') ? c.dataset.label : c.raw.title
                        }
                    }
                }
            },
            plugins: [backgroundZonesPlugin, trajectoryPlugin]
        });
    }

    function updateChart(key) {
        if (!myChart) return;
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + key).classList.add('active');

        // Update all 3 datasets
        myChart.data.datasets[0].data = scenarios[key].curve1;
        myChart.data.datasets[1].data = scenarios[key].curve2;
        myChart.data.datasets[2].data = scenarios[key].bubbles;
        myChart.update();
    }

    window.onload = initChart;

</script>
</body>
</html>
